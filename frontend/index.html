<!DOCTYPE html>
<html lang="en" data-brand="taali">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var legacyHosts = {
          "frontend-psi-navy-15.vercel.app": true,
          "frontend-sam-patels-projects.vercel.app": true,
          "frontend-sampatel3-sam-patels-projects.vercel.app": true
        };

        if (!legacyHosts[window.location.hostname]) {
          return;
        }

        var target =
          "https://www.taali.ai" +
          window.location.pathname +
          window.location.search +
          window.location.hash;

        window.location.replace(target);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"

    />

      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
