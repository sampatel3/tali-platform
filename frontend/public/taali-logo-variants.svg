<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1F1630" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1400" height="820" fill="#F7F4FB"/>
  <text x="84" y="110" fill="#1D1730" font-family="Arial, sans-serif" font-size="52" font-weight="700">TAALI logo study</text>
  <text x="84" y="152" fill="#6E6580" font-family="Arial, sans-serif" font-size="24">Primary assessment mark plus a few line-only purple options.</text>

  <g transform="translate(84 220)">
    <rect width="286" height="456" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>
    <text x="34" y="62" fill="#1D1730" font-family="Arial, sans-serif" font-size="28" font-weight="700">Primary</text>
    <text x="34" y="96" fill="#6E6580" font-family="Arial, sans-serif" font-size="20">Circle with white tally lines</text>
    <circle cx="143" cy="220" r="76" fill="#9D00FF"/>
    <g stroke="#FFFFFF" stroke-width="12" stroke-linecap="round">
      <line x1="113" y1="174" x2="113" y2="266"/>
      <line x1="133" y1="174" x2="133" y2="266"/>
      <line x1="153" y1="174" x2="153" y2="266"/>
      <line x1="173" y1="174" x2="173" y2="266"/>
      <line x1="100" y1="252" x2="186" y2="188"/>
    </g>
    <text x="143" y="360" text-anchor="middle" fill="#1D1730" font-family="Arial, sans-serif" font-size="44" font-weight="700">TAALI</text>
    <text x="34" y="408" fill="#6E6580" font-family="Arial, sans-serif" font-size="20">Use this as the default app mark.</text>
  </g>

  <g transform="translate(404 220)">
    <rect width="286" height="456" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>
    <text x="34" y="62" fill="#1D1730" font-family="Arial, sans-serif" font-size="28" font-weight="700">Lines only</text>
    <text x="34" y="96" fill="#6E6580" font-family="Arial, sans-serif" font-size="20">Pure brand purple, no container</text>
    <g stroke="#9D00FF" stroke-width="12" stroke-linecap="round">
      <line x1="113" y1="174" x2="113" y2="266"/>
      <line x1="133" y1="174" x2="133" y2="266"/>
      <line x1="153" y1="174" x2="153" y2="266"/>
      <line x1="173" y1="174" x2="173" y2="266"/>
      <line x1="100" y1="252" x2="186" y2="188"/>
    </g>
    <text x="143" y="360" text-anchor="middle" fill="#9D00FF" font-family="Arial, sans-serif" font-size="44" font-weight="700">TAALI</text>
    <text x="34" y="408" fill="#6E6580" font-family="Arial, sans-serif" font-size="20">Cleanest stripped-back direction.</text>
  </g>

  <g transform="translate(724 220)">
    <rect width="286" height="456" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>
    <text x="34" y="62" fill="#1D1730" font-family="Arial, sans-serif" font-size="28" font-weight="700">Lines only, deep</text>
    <text x="34" y="96" fill="#6E6580" font-family="Arial, sans-serif" font-size="20">Slightly darker purple for contrast</text>
    <g stroke="#7F39FB" stroke-width="12" stroke-linecap="round">
      <line x1="113" y1="174" x2="113" y2="266"/>
      <line x1="133" y1="174" x2="133" y2="266"/>
      <line x1="153" y1="174" x2="153" y2="266"/>
      <line x1="173" y1="174" x2="173" y2="266"/>
      <line x1="100" y1="252" x2="186" y2="188"/>
    </g>
    <text x="143" y="360" text-anchor="middle" fill="#7F39FB" font-family="Arial, sans-serif" font-size="44" font-weight="700">TAALI</text>
    <text x="34" y="408" fill="#6E6580" font-family="Arial, sans-serif" font-size="20">Best if the base purple feels too bright.</text>
  </g>

  <g transform="translate(1044 220)">
    <rect width="272" height="456" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>
    <text x="34" y="62" fill="#1D1730" font-family="Arial, sans-serif" font-size="28" font-weight="700">Lines only, soft</text>
    <text x="34" y="96" fill="#6E6580" font-family="Arial, sans-serif" font-size="20">Lighter, more editorial</text>
    <g stroke="#B06BFF" stroke-width="12" stroke-linecap="round">
      <line x1="106" y1="174" x2="106" y2="266"/>
      <line x1="126" y1="174" x2="126" y2="266"/>
      <line x1="146" y1="174" x2="146" y2="266"/>
      <line x1="166" y1="174" x2="166" y2="266"/>
      <line x1="93" y1="252" x2="179" y2="188"/>
    </g>
    <text x="136" y="360" text-anchor="middle" fill="#B06BFF" font-family="Arial, sans-serif" font-size="44" font-weight="700">TAALI</text>
    <text x="34" y="408" fill="#6E6580" font-family="Arial, sans-serif" font-size="20">Works if you want a lighter tone.</text>
  </g>
</svg>
