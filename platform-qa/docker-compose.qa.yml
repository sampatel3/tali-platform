# Throwaway Postgres for Tier 2 E2E/integration runs.
#
# Port 55432 ON PURPOSE — never 5432. The host's 5432 may be the developer's
# local Postgres or an ssh tunnel to prod, and the QA teardown drops schemas
# between tests. This container is disposable: `docker compose -f
# docker-compose.qa.yml down -v` wipes it.
#
#   docker compose -f docker-compose.qa.yml up -d
#   export QA_DATABASE_URL=postgresql://qa:qa@localhost:55432/qa
services:
  qa-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: qa
      POSTGRES_PASSWORD: qa
      POSTGRES_DB: qa
    ports:
      - "55432:5432"
    tmpfs:
      - /var/lib/postgresql/data   # ephemeral: nothing survives a restart
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa"]
      interval: 2s
      timeout: 3s
      retries: 20
