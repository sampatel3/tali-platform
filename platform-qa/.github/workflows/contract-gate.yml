name: Tier 2 Contract Gate

# Lives inside platform-qa/ so it activates once this skeleton is extracted
# into sampatel3/platform-qa. (Nested .github dirs are inert in tali-platform.)
#
# Triggers (see docs/qa/TWO_TIER_QA_STRATEGY.md §5.3):
#   * PR to platform-qa, and push to main
#   * repository_dispatch from a substrate/brand PR (fan-out) — turn on at pilot
#   * nightly full matrix
on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * *'      # nightly full contract + E2E matrix
  # repository_dispatch:      # <-- enable at pilot: fan-out from mainspring/taali/cadence PRs
  #   types: [substrate-change, brand-change]

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Bootstrap
        run: |
          python -m pip install --upgrade pip
          pip install -e . || pip install pytest httpx pydantic 'psycopg[binary]'
      - name: Contract tests (substrate ↔ brands)
        # Fast, no services — catches a substrate change that breaks a brand
        # before it can merge.
        run: pytest tests/contract -q

  e2e:
    runs-on: ubuntu-latest
    # Nightly + main only — E2E is the slower assembled-platform safety net.
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    services:
      qa-postgres:
        image: postgres:15
        env:
          POSTGRES_USER: qa
          POSTGRES_PASSWORD: qa
          POSTGRES_DB: qa
        ports:
          - "55432:5432"      # never 5432
        options: >-
          --health-cmd "pg_isready -U qa"
          --health-interval 2s --health-timeout 3s --health-retries 20
    env:
      QA_DATABASE_URL: postgresql://qa:qa@localhost:55432/qa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Bootstrap
        run: |
          python -m pip install --upgrade pip
          pip install -e . || pip install pytest httpx pydantic 'psycopg[binary]'
      - name: E2E (assembled platform vs real Postgres)
        run: pytest tests/e2e -q
