[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_default_fixture_loop_scope = function
filterwarnings =
    error:coroutine .* was never awaited:RuntimeWarning
    error:(?s)Exception ignored in.*RuntimeWarning.*coroutine .* was never awaited:pytest.PytestUnraisableExceptionWarning
markers =
    smoke: production smoke tests
    security: security-focused tests
    e2e: end-to-end flow tests
    production: tests that hit live deployed environments
addopts = --tb=short -m "not production"
