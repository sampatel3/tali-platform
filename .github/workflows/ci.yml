name: CI

# Pre-pilot: nobody on prod yet, so CI is intentionally minimal —
# build/syntax gates only, fast feedback, no test suite. Run tests
# locally before significant changes; the Production Smoke Tests
# workflow exercises the live API on a separate cadence.
#
# Restored when the platform has real users:
# - backend pytest (with Redis service container for Celery paths)
# - frontend vitest
# - coverage thresholds
# - dead-code report

on:
  pull_request:
  push:
    branches: [main, master, work]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Backend syntax check
        # Compiles every .py file in app/ — catches syntax errors,
        # bad indentation, and broken imports of stdlib/typing names.
        # Does not import third-party deps, so doesn't need pip install.
        run: python -m compileall -q app
      - name: Alembic single-head gate
        # Fails fast when two migrations branch from the same parent and
        # leave main with multiple heads — which makes `alembic upgrade
        # head` (run on boot) crash-loop the deploy. Stdlib-only, so it
        # needs no pip install. Fix = add a merge revision.
        run: python scripts/check_alembic_single_head.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Frontend architecture gates
        # Cheap line-count + structural cap — keeps single files from
        # ballooning past the 2,600-line threshold.
        run: npm run check:architecture
      - name: Build frontend
        # Vite build will fail on import errors, type errors (where
        # tsc is wired), and missing modules — the cheap regression
        # net we keep while pre-pilot.
        run: npm run build
