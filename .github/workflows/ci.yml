name: CI

# Fast structural checks plus focused behavioral regressions for merge-prone
# application flows. The separate Production Smoke Tests workflow exercises
# the live API on a scheduled cadence.

on:
  pull_request:
  merge_group:
    types: [checks_requested]
  push:
    branches: [main, master, work]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  merge-safety:
    # The merge queue receives the backend/frontend checks below against its
    # already-composed merge-group SHA. This job inspects a PR's real head.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout actual head (not the synthetic PR merge commit)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Validate event base SHA is available
        id: current-base
        env:
          EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          git cat-file -e "$EVENT_BASE_SHA^{commit}"
          echo "sha=$EVENT_BASE_SHA" >> "$GITHUB_OUTPUT"
      - name: Check branch freshness and simulate merge
        env:
          BASE_SHA: ${{ steps.current-base.outputs.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_LABEL: ${{ github.event.pull_request.base.ref }}
        run: |
          python scripts/ci/check_merge_safety.py \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --base-label "$BASE_LABEL"

  backend:
    needs: merge-safety
    if: always()
    runs-on: ubuntu-latest
    services:
      postgres-search:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taali_search_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d taali_search_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      # Kept separate from DATABASE_URL so the ordinary test suite remains on
      # its isolated SQLite database. Only the explicit PostgreSQL gate below
      # may consume this disposable database.
      TALI_SEARCH_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/taali_search_test
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Require merge-safety success for pull requests
        if: github.event_name == 'pull_request'
        env:
          MERGE_SAFETY_RESULT: ${{ needs.merge-safety.result }}
        run: |
          if [[ "$MERGE_SAFETY_RESULT" != "success" ]]; then
            echo "merge-safety must pass before backend CI can pass (result: $MERGE_SAFETY_RESULT)" >&2
            exit 1
          fi
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Backend syntax check
        # Compiles every .py file in app/ — catches syntax errors,
        # bad indentation, and broken imports of stdlib/typing names.
        # Does not import third-party deps, so doesn't need pip install.
        run: python -m compileall -q app
      - name: Alembic single-head gate
        # Fails fast when two migrations branch from the same parent and
        # leave main with multiple heads — which makes `alembic upgrade
        # head` (run on boot) crash-loop the deploy. Stdlib-only, so it
        # needs no pip install. Fix = add a merge revision.
        run: python scripts/check_alembic_single_head.py
      - name: Backend file-size gate
        # Backend mirror of the frontend architecture gate: new API/service
        # modules stay <= 500 LOC and existing hotspots have burn-down caps.
        # Stdlib-only. Fix = split the file, don't raise a ratcheted baseline.
        run: python scripts/check_file_sizes.py
      - name: Fluency-axis coverage gate
        # Every production task rubric must grade all five fluency axes, or
        # declare a reviewed fluency_coverage_exemption. Without this a task can
        # grade two axes while the candidate report still shows five, backfilling
        # the rest from behavioural heuristics that aren't grades. Stdlib-only.
        # Fix = add the missing dimensions, don't widen the exemption.
        run: python scripts/check_fluency_coverage.py
      - name: AI feature eval coverage gate
        # Every metered AI Feature except OTHER must declare risk and offline
        # test coverage (or a reasoned infrastructure exemption). Grounded
        # coverage names exact truth cases; critical behavioral-only gaps must
        # be explicitly reviewed. Adding an enum member without a decision fails.
        run: python scripts/check_ai_eval_coverage.py
      - name: Install backend test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt
      - name: Build disposable candidate-search PostgreSQL schema
        # A registered grounded-truth case exercises the real PostgreSQL search
        # path, so the disposable schema must exist before the eval suite runs.
        # The helper creates the ORM baseline, executes the real candidate-search
        # index migration, and stamps the test-only schema at repository head.
        run: python scripts/bootstrap_candidate_search_postgres.py
      - name: Registered offline AI feature evals
        # The registry is the source of truth for this focused suite. Provider
        # credentials are blank by design: these tests must stay deterministic
        # and zero-provider-cost.
        env:
          ANTHROPIC_API_KEY: ""
          ANTHROPIC_ADMIN_API_KEY: ""
          CLAUDE_API_KEY: ""
          OPENAI_API_KEY: ""
          VOYAGE_API_KEY: ""
          E2B_API_KEY: ""
        run: |
          mapfile -t AI_EVAL_TESTS < <(python scripts/check_ai_eval_coverage.py --list-tests)
          python -m pytest -q "${AI_EVAL_TESTS[@]}" tests/evals/test_ai_eval_registry.py
      - name: PostgreSQL candidate-search truth matrix
        # Executes the real parser -> scope -> PostgreSQL -> fusion -> product
        # handler chain. Provider/model/GraphDB boundaries are local fakes.
        run: |
          python -m pytest -q \
            tests/postgres/test_candidate_search_runtime_matrix.py \
            tests/postgres/test_production_search_canary.py
      - name: Targeted backend regression tests
        # Pins canonical-release controls and merge-sensitive behavior: local
        # ATS writes, role ordering/paging, atomic assessment dispatch, and
        # worker startup ordering behind database migrations.
        run: |
          python -m pytest -q \
            ../scripts/ci/tests/test_check_merge_safety.py \
            tests/platform/test_release_safeguards.py \
            tests/platform/test_release_metadata.py \
            tests/platform/test_railway_deployment_contract.py \
            tests/platform/test_production_search_canary_contract.py \
            tests/platform/test_railway_worker_start.py \
            tests/evals \
            tests/test_agent_chat_*.py \
            tests/test_agent_runtime_orchestrator.py \
            tests/test_agent_runtime_tools.py \
            tests/agent_runtime_policy/test_policy_evaluator.py \
            tests/sub_agents/test_pre_screen_sub_agent.py \
            tests/test_api_nl_search.py \
            tests/sub_agents/test_graph_priors_sub_agent.py \
            tests/test_candidate_graph_queries.py \
            tests/test_candidate_graph_evidence_search.py \
            tests/test_candidate_search_evidence_matching.py \
            tests/test_candidate_search_graph_cache.py \
            tests/test_candidate_search_hybrid.py \
            tests/test_candidate_search_metering.py \
            tests/test_candidate_search_population.py \
            tests/test_candidate_search_provider_mode.py \
            tests/test_candidate_search_rerank.py \
            tests/test_candidate_search_runner_hybrid.py \
            tests/test_candidate_search_tool_failure_contract.py \
            tests/test_grounded_top_candidates.py \
            tests/test_llm_gateway.py \
            tests/test_metered_async_anthropic.py \
            tests/test_metered_provider_admission.py \
            tests/test_mcp_catalog.py \
            tests/test_pre_screen_usage_admission.py \
            tests/test_taali_chat_handlers.py \
            tests/test_taali_chat_routes.py \
            tests/test_taali_chat_role_scoped.py \
            tests/test_taali_chat_service.py \
            tests/test_graph_episode_outbox.py \
            tests/test_graph_outbox_role_id_migration.py \
            tests/test_workable_stage_local_write_guard.py \
            tests/test_roles_list_ordering.py \
            tests/test_send_assessment_action.py \
            tests/test_sister_roles.py
          python -m pytest -q \
            tests/test_production_search_canary.py \
            tests/test_search_canary_provision.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Frontend architecture gates
        # Cheap line-count + structural cap — keeps single files from
        # ballooning past the 2,600-line threshold.
        run: npm run check:architecture
      - name: Targeted frontend regression tests
        # Guards merge-prone role dimming, optimistic decision reconciliation,
        # and immutable asset caching/404 routing.
        run: |
          npm test -- \
            src/features/jobs/JobsPage.test.jsx \
            src/features/home/HomeNow.optimistic.test.jsx \
            src/features/chat/Thread.test.jsx \
            src/features/chat/useChatStream.session.test.jsx
          npm test -- src/features/candidates/candidatesUiUtils.test.js
          npm test -- src/test/vercelCaching.test.js
      - name: Build frontend
        # Vite build will fail on import errors, type errors (where
        # tsc is wired), and missing modules — the cheap regression
        # net we keep while pre-pilot.
        run: npm run build
