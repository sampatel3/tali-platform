name: Production Smoke Tests

on:
  workflow_dispatch:
    inputs:
      tali_prod_url:
        description: 'Production backend URL (e.g. https://<service>.up.railway.app)'
        required: true
  schedule:
    - cron: '0 */12 * * *'

jobs:
  smoke:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Python 3.11.9
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11.9'
          cache: pip
          cache-dependency-path: backend/requirements-lock.txt
      - name: Verify hashed Python dependency lock
        run: python scripts/check_requirements_lock.py
      - name: Install exact runtime and test dependency graph
        run: |
          python -m pip install --require-hashes -r requirements-lock.txt
          python -m pip check
      - name: Audit installed Python dependencies
        run: pip-audit --local
      - name: Require an explicit production target
        env:
          TALI_PROD_URL: ${{ inputs.tali_prod_url || secrets.TALI_PROD_URL }}
        run: test -n "$TALI_PROD_URL"
      - name: Run read-only production contract suite
        env:
          TALI_PROD_URL: ${{ inputs.tali_prod_url || secrets.TALI_PROD_URL }}
          TALI_FRONTEND_URL: ${{ secrets.TALI_FRONTEND_URL || 'https://www.taali.ai' }}
        run: pytest -q -m production tests/test_qa_production_smoke.py
