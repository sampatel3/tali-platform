<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3d1a7a"/>
      <stop offset="0.55" stop-color="#5b2ca8"/>
      <stop offset="1" stop-color="#8867c4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.18" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- kicker -->
  <text x="90" y="150" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700"
        letter-spacing="4" fill="#e9defb" opacity="0.85">AGENTIC-FIRST · AI-NATIVE HIRING</text>

  <!-- wordmark -->
  <text x="84" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="200" font-weight="700"
        letter-spacing="-6" fill="#ffffff">taali<tspan fill="#c9b3f0">.</tspan></text>

  <!-- tagline -->
  <text x="90" y="410" font-family="Helvetica, Arial, sans-serif" font-size="48" font-weight="600" fill="#ffffff">
    The recruiter&#8217;s agent.</text>

  <!-- keyword line -->
  <text x="90" y="470" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="400" fill="#e9defb" opacity="0.9">
    Agentic hiring &#183; AI-native assessments &#183; scores how engineers use AI</text>

  <!-- url -->
  <text x="90" y="565" font-family="'Courier New', monospace" font-size="26" font-weight="700"
        letter-spacing="2" fill="#ffffff" opacity="0.75">taali.ai</text>
</svg>
