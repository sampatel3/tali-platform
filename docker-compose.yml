services:
  postgres:
    image: postgres:16.14@sha256:17e67d7b9890c99b055ba1e0d5c5be4ec27c9d3a72bda32db24a5e5d8a85af0c
    restart: unless-stopped
    environment:
      POSTGRES_USER: taali
      POSTGRES_PASSWORD: taali_dev_password
      POSTGRES_DB: taali_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7.4.9-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
